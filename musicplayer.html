<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" type="text/css" href="musicplayer.css">
        <link rel="javascript" type="text/js" href="musicplayer.js">
    </head>
    <body>
        <audio>
            <!--TODO Change Song-->
            <source src="https://file.garden/aFLtBvZHKBpIuzuq/Mili%20-%20Bathtub%20Mermaid%20%5B%20ezmp3.cc%20%5D.mp3"  type="audio/mp3">
        </audio> 
        <!-- <div style="width: 50px; height: 50px;"></div> -->
        <div class="audio-player">
        <div class="timeline">
        <div class="progress"></div>
        </div>
        <div class="controls">
            <div class="play-container">
            <div class="toggle-play play"></div>
            </div>
            <div class="time">
            <div class="current">0:00</div>
            <div class="divider">/</div>
            <div class="length"></div>
            </div>
            <div class="name">Music Song</div>
        <!--credit for icon to https://saeedalipoor.github.io/icono/ -->
            <div class="volume-container">
            <div class="volume-button">
                <div class="volume icono-volumeMedium"></div>
            </div>
            <div class="volume-slider">
                <div class="volume-percentage"></div>
            </div>
            </div>
            <!--Missing Div?-->
        <!-- </div> -->
        </div>
    </body>
</html>
